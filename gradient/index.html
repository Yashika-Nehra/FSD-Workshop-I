<!DOCTYPE html>
<html>
<head>
    <title>CSS Gradient Grid</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>CSS Gradient Directions</h2>

<div class="container">

    <div class="box left-right">
        <p>Left to Right</p>
    </div>

    <div class="box right-left">
        <p>Right to Left</p>
    </div>

    <div class="box top-bottom">
        <p>Top to Bottom</p>
    </div>

    <div class="box bottom-top">
        <p>Bottom to Top</p>
    </div>

</div>

</body>
</html>
